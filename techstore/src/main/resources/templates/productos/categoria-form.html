<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Phantom | Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>
<nav class="navbar-ts">
    <div class="brand">TECH<span class="brand-dot">●</span>STORE</div>
    <a href="/productos" class="nav-btn"><i class="bi bi-arrow-left"></i> Volver</a>
</nav>
<div class="main">
    <div class="form-card">
        <div class="form-header">
            <div class="form-title">Nueva <span>Categoría</span></div>
            <div class="form-subtitle">// Registra una nueva categoría de productos</div>
        </div>
        <form th:action="@{/productos/categorias/guardar}" th:object="${categoria}" method="post">
            <input type="hidden" th:field="*{id}"/>
            <div class="form-body">
                <div class="field-group">
                    <label class="field-label">Nombre de la categoría</label>
                    <input type="text" th:field="*{nombre}" class="field-input" placeholder="Ej. Laptops, Periféricos, Audio..." required/>
                </div>
                <div class="field-group">
                    <label class="field-label">Descripción</label>
                    <textarea th:field="*{descripcion}" class="field-textarea" placeholder="Descripción de la categoría..."></textarea>
                </div>
            </div>
            <div class="form-footer">
                <a href="/productos" class="btn-cancel"><i class="bi bi-x"></i> Cancelar</a>
                <button type="submit" class="btn-save"><i class="bi bi-check-lg"></i> Guardar</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
