<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Nueva Categoría | TechStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        :root { --bg:#0a0a0f; --surface:#12121a; --border:#1e1e2e; --accent:#e63946; --accent2:#ff6b6b; --text:#e8e8f0; --muted:#6b6b85; }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh}
        .navbar-ts{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
        .brand{font-size:1.3rem;font-weight:800;letter-spacing:-.02em}
        .brand-dot{color:var(--accent)}
        .nav-btn{display:inline-flex;align-items:center;gap:.4rem;padding:.45rem 1rem;border-radius:6px;font-family:'Syne',sans-serif;font-weight:600;font-size:.85rem;text-decoration:none;border:1px solid var(--border);color:var(--text);background:transparent;cursor:pointer;transition:all .2s}
        .nav-btn:hover{border-color:var(--accent);color:var(--accent)}
        .main{max-width:520px;margin:0 auto;padding:3rem 1.5rem}
        .form-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
        .form-header{padding:1.75rem 2rem 1.5rem;border-bottom:1px solid var(--border)}
        .form-title{font-size:1.5rem;font-weight:800}
        .form-title span{color:var(--accent)}
        .form-subtitle{color:var(--muted);font-size:.8rem;font-family:'Space Mono',monospace;margin-top:.3rem}
        .form-body{padding:2rem;display:flex;flex-direction:column;gap:1.25rem}
        .field-group{display:flex;flex-direction:column;gap:.4rem}
        .field-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-family:'Space Mono',monospace;font-weight:700}
        .field-input,.field-textarea{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:.7rem 1rem;border-radius:8px;font-family:'Syne',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;width:100%}
        .field-input:focus,.field-textarea:focus{border-color:var(--accent)}
        .field-textarea{resize:vertical;min-height:90px}
        .form-footer{padding:1.5rem 2rem;border-top:1px solid var(--border);display:flex;gap:.75rem;justify-content:flex-end}
        .btn-cancel{display:inline-flex;align-items:center;gap:.4rem;padding:.65rem 1.2rem;border-radius:8px;font-family:'Syne',sans-serif;font-weight:600;font-size:.85rem;text-decoration:none;border:1px solid var(--border);color:var(--text);background:transparent;cursor:pointer}
        .btn-save{display:inline-flex;align-items:center;gap:.4rem;padding:.65rem 1.6rem;border-radius:8px;font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;border:none;background:var(--accent);color:#fff;cursor:pointer;transition:background .2s}
        .btn-save:hover{background:var(--accent2)}
    </style>
</head>
<body>
<nav class="navbar-ts">
    <div class="brand">TECH<span class="brand-dot">●</span>STORE</div>
    <a href="/productos" class="nav-btn"><i class="bi bi-arrow-left"></i> Volver</a>
</nav>
<div class="main">
    <div class="form-card">
        <div class="form-header">
            <div class="form-title">Nueva <span>Categoría</span></div>
            <div class="form-subtitle">// Registra una nueva categoría de productos</div>
        </div>
        <form th:action="@{/productos/categorias/guardar}" th:object="${categoria}" method="post">
            <input type="hidden" th:field="*{id}"/>
            <div class="form-body">
                <div class="field-group">
                    <label class="field-label">Nombre de la categoría</label>
                    <input type="text" th:field="*{nombre}" class="field-input" placeholder="Ej. Laptops, Periféricos, Audio..." required/>
                </div>
                <div class="field-group">
                    <label class="field-label">Descripción</label>
                    <textarea th:field="*{descripcion}" class="field-textarea" placeholder="Descripción de la categoría..."></textarea>
                </div>
            </div>
            <div class="form-footer">
                <a href="/productos" class="btn-cancel"><i class="bi bi-x"></i> Cancelar</a>
                <button type="submit" class="btn-save"><i class="bi bi-check-lg"></i> Guardar</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
