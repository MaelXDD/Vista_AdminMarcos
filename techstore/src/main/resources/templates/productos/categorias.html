<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Categorías | TechStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        :root {
            --bg: #0a0a0f; --surface: #12121a; --border: #1e1e2e;
            --accent: #e63946; --accent2: #ff6b6b; --text: #e8e8f0; --muted: #6b6b85;
            --success: #06d6a0; --warning: #ffd166;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; }

        .navbar-ts {
            background: var(--surface); border-bottom: 1px solid var(--border);
            padding: 0 2rem; height: 64px; display: flex; align-items: center;
            justify-content: space-between; position: sticky; top: 0; z-index: 100;
        }
        .brand { font-size: 1.3rem; font-weight: 800; letter-spacing: -.02em; }
        .brand-dot { color: var(--accent); }
        .nav-btn {
            display: inline-flex; align-items: center; gap: .4rem;
            padding: .45rem 1rem; border-radius: 6px;
            font-family: 'Syne', sans-serif; font-weight: 600; font-size: .85rem;
            text-decoration: none; border: 1px solid var(--border);
            color: var(--text); background: transparent; cursor: pointer; transition: all .2s;
        }
        .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
        .nav-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
        .nav-btn.primary:hover { background: var(--accent2); border-color: var(--accent2); }

        .main { max-width: 800px; margin: 0 auto; padding: 2.5rem 1.5rem; }

        .page-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .page-title { font-size: 2rem; font-weight: 800; letter-spacing: -.03em; }
        .page-title span { color: var(--accent); }
        .page-sub { color: var(--muted); font-size: .85rem; margin-top: .3rem; font-family: 'Space Mono', monospace; }

        /* Alert error */
        .alert-error {
            background: rgba(230,57,70,.1); border: 1px solid rgba(230,57,70,.3);
            color: var(--accent2); border-radius: 10px; padding: .9rem 1.25rem;
            margin-bottom: 1.5rem; display: flex; align-items: center; gap: .6rem;
            font-size: .9rem;
        }

        .table-wrap {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        thead tr {
            background: var(--border); font-family: 'Space Mono', monospace;
            font-size: .75rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted);
        }
        th { padding: .85rem 1.25rem; text-align: left; }
        td { padding: .9rem 1.25rem; border-top: 1px solid var(--border); font-size: .9rem; vertical-align: middle; }
        tbody tr { transition: background .15s; }
        tbody tr:hover { background: rgba(230,57,70,.04); }

        .badge-count {
            display: inline-block; padding: .2rem .65rem; border-radius: 100px;
            font-size: .72rem; font-family: 'Space Mono', monospace; font-weight: 700;
        }
        .count-ok  { background: rgba(6,214,160,.1);  color: var(--success); border: 1px solid rgba(6,214,160,.2); }
        .count-has { background: rgba(255,209,102,.1); color: var(--warning); border: 1px solid rgba(255,209,102,.2); }

        .action-btn {
            display: inline-flex; align-items: center; gap: .3rem;
            padding: .32rem .75rem; border-radius: 6px; font-size: .78rem;
            font-family: 'Syne', sans-serif; font-weight: 600;
            text-decoration: none; border: 1px solid transparent; cursor: pointer; transition: all .18s;
        }
        .btn-del { background: rgba(230,57,70,.1); color: var(--accent2); border-color: rgba(230,57,70,.2); }
        .btn-del:hover { background: rgba(230,57,70,.22); color: var(--accent2); }
        .btn-disabled {
            background: rgba(255,255,255,.03); color: var(--muted);
            border-color: var(--border); cursor: not-allowed; opacity: .5;
        }

        .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); font-family: 'Space Mono', monospace; font-size: .85rem; }
        .empty i { font-size: 2rem; opacity: .3; display: block; margin-bottom: .6rem; }
    </style>
</head>
<body>

<nav class="navbar-ts">
    <div class="brand">TECH<span class="brand-dot">●</span>STORE</div>
    <div style="display:flex;gap:.75rem;">
        <a href="/productos" class="nav-btn"><i class="bi bi-box-seam"></i> Productos</a>
        <a href="/productos/categorias/nueva" class="nav-btn primary"><i class="bi bi-plus-lg"></i> Nueva Categoría</a>
    </div>
</nav>

<div class="main">

    <div class="page-header">
        <div>
            <div class="page-title">Gestión de <span>Categorías</span></div>
            <div class="page-sub">// Solo se pueden eliminar categorías sin productos</div>
        </div>
    </div>

    <!-- Error flash -->
    <div class="alert-error" th:if="${errorCat}">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span th:text="${errorCat}"></span>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Productos</th>
                <th>Acción</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(categorias)}">
                <td colspan="5">
                    <div class="empty">
                        <i class="bi bi-tags"></i>
                        No hay categorías registradas.
                    </div>
                </td>
            </tr>
            <tr th:each="cat : ${categorias}">
                <td style="color:var(--muted);font-family:'Space Mono',monospace;font-size:.8rem;" th:text="${cat.id}">1</td>
                <td style="font-weight:600;" th:text="${cat.nombre}">—</td>
                <td style="color:var(--muted);font-size:.85rem;" th:text="${cat.descripcion != null ? cat.descripcion : '—'}">—</td>
                <td>
                    <span th:if="${cat.productos == null or #lists.isEmpty(cat.productos)}"
                          class="badge-count count-ok">Vacía</span>
                    <span th:if="${cat.productos != null and not #lists.isEmpty(cat.productos)}"
                          class="badge-count count-has"
                          th:text="${#lists.size(cat.productos)} + ' producto(s)'">—</span>
                </td>
                <td>
                    <!-- Solo permite eliminar si está vacía -->
                    <a th:if="${cat.productos == null or #lists.isEmpty(cat.productos)}"
                       th:href="@{/productos/categorias/eliminar/{id}(id=${cat.id})}"
                       class="action-btn btn-del"
                       onclick="return confirm('¿Eliminar esta categoría?')">
                        <i class="bi bi-trash-fill"></i> Eliminar
                    </a>
                    <span th:if="${cat.productos != null and not #lists.isEmpty(cat.productos)}"
                          class="action-btn btn-disabled"
                          title="Tiene productos asociados">
                        <i class="bi bi-lock-fill"></i> Bloqueado
                    </span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
