<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TechStore | Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        :root {
            --bg:       #0a0a0f;
            --surface:  #12121a;
            --border:   #1e1e2e;
            --accent:   #e63946;
            --accent2:  #ff6b6b;
            --text:     #e8e8f0;
            --muted:    #6b6b85;
            --success:  #06d6a0;
            --warning:  #ffd166;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
        }

        /* ── NAVBAR ─────────────────────────────────── */
        .navbar-ts {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(8px);
        }
        .brand {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: .5rem;
        }
        .brand-dot { color: var(--accent); }
        .nav-links { display: flex; gap: 1rem; }
        .nav-btn {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            padding: .45rem 1rem;
            border-radius: 6px;
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: .85rem;
            text-decoration: none;
            border: 1px solid var(--border);
            color: var(--text);
            background: transparent;
            cursor: pointer;
            transition: all .2s;
        }
        .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
        .nav-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
        .nav-btn.primary:hover { background: var(--accent2); border-color: var(--accent2); color: #fff; }

        /* ── LAYOUT ─────────────────────────────────── */
        .main { max-width: 1200px; margin: 0 auto; padding: 2.5rem 1.5rem; }

        /* ── HEADER BLOCK ────────────────────────────── */
        .page-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .page-title {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -.03em;
            line-height: 1;
        }
        .page-title span { color: var(--accent); }
        .page-sub { color: var(--muted); font-size: .9rem; margin-top: .3rem; font-family: 'Space Mono', monospace; }

        /* ── SEARCH BAR ──────────────────────────────── */
        .search-bar {
            display: flex;
            gap: .75rem;
            margin-bottom: 1.75rem;
        }
        .search-input {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: .65rem 1rem;
            border-radius: 8px;
            font-family: 'Space Mono', monospace;
            font-size: .85rem;
            outline: none;
            transition: border-color .2s;
        }
        .search-input:focus { border-color: var(--accent); }
        .search-input::placeholder { color: var(--muted); }
        .search-btn {
            background: var(--accent);
            border: none;
            color: #fff;
            padding: .65rem 1.2rem;
            border-radius: 8px;
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s;
            display: flex;
            align-items: center;
            gap: .4rem;
        }
        .search-btn:hover { background: var(--accent2); }

        /* ── TABLE ───────────────────────────────────── */
        .table-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        thead tr {
            background: var(--border);
            font-family: 'Space Mono', monospace;
            font-size: .75rem;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--muted);
        }
        th { padding: .85rem 1.25rem; text-align: left; }
        td {
            padding: .9rem 1.25rem;
            border-top: 1px solid var(--border);
            font-size: .9rem;
            vertical-align: middle;
        }
        tbody tr { transition: background .15s; }
        tbody tr:hover { background: rgba(230,57,70,.04); }

        /* badges */
        .badge-cat {
            display: inline-block;
            padding: .2rem .65rem;
            border-radius: 100px;
            font-size: .72rem;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            background: rgba(230,57,70,.12);
            color: var(--accent2);
            border: 1px solid rgba(230,57,70,.2);
        }
        .badge-stock {
            display: inline-block;
            padding: .2rem .65rem;
            border-radius: 100px;
            font-size: .72rem;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
        }
        .stock-ok  { background: rgba(6,214,160,.1);  color: var(--success); border: 1px solid rgba(6,214,160,.2); }
        .stock-low { background: rgba(255,209,102,.1); color: var(--warning); border: 1px solid rgba(255,209,102,.2); }

        .precio { font-family: 'Space Mono', monospace; font-weight: 700; font-size: .95rem; }

        /* action buttons */
        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: .3rem;
            padding: .32rem .75rem;
            border-radius: 6px;
            font-size: .78rem;
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            text-decoration: none;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all .18s;
        }
        .btn-edit  { background: rgba(255,209,102,.1); color: var(--warning); border-color: rgba(255,209,102,.2); }
        .btn-edit:hover  { background: rgba(255,209,102,.2); color: var(--warning); }
        .btn-del   { background: rgba(230,57,70,.1);   color: var(--accent2); border-color: rgba(230,57,70,.2); }
        .btn-del:hover   { background: rgba(230,57,70,.22); color: var(--accent2); }

        /* empty state */
        .empty {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--muted);
            font-family: 'Space Mono', monospace;
            font-size: .85rem;
        }
        .empty i { font-size: 2.5rem; opacity: .3; display: block; margin-bottom: .75rem; }

        /* stats row */
        .stats-row { display: flex; gap: 1rem; margin-bottom: 1.75rem; flex-wrap: wrap; }
        .stat-card {
            flex: 1;
            min-width: 140px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem 1.25rem;
        }
        .stat-label { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; font-family: 'Space Mono', monospace; }
        .stat-value { font-size: 1.6rem; font-weight: 800; line-height: 1.1; margin-top: .2rem; }
        .stat-value.red { color: var(--accent); }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar-ts">
    <div class="brand">TECH<span class="brand-dot">●</span>STORE</div>
    <div class="nav-links">
        <a href="/productos/categorias/nueva" class="nav-btn"><i class="bi bi-tags"></i> Nueva Categoría</a>
        <a href="/productos/nuevo" class="nav-btn primary"><i class="bi bi-plus-lg"></i> Nuevo Producto</a>
        <a href="/productos/categorias" class="nav-btn"><i class="bi bi-tags"></i> Categorías</a>
    </div>
</nav>

<!-- MAIN -->
<div class="main">

    <!-- Header -->
    <div class="page-header">
        <div>
            <div class="page-title">Gestión de <span>Productos</span></div>
            <div class="page-sub">// TechStore Perú — Panel de administración</div>
        </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-label">Total productos</div>
            <div class="stat-value red" th:text="${#lists.size(productos)}">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Búsqueda activa</div>
            <div class="stat-value" style="font-size:1rem;padding-top:.35rem;"
                 th:text="${keyword != null and !#strings.isEmpty(keyword)} ? '&quot;' + keyword + '&quot;' : '—'">—</div>
        </div>
    </div>

    <!-- Search -->
    <form th:action="@{/productos}" method="get" class="search-bar">
        <input type="text" name="keyword" class="search-input"
               placeholder="Buscar producto por nombre..."
               th:value="${keyword}"/>
        <button type="submit" class="search-btn"><i class="bi bi-search"></i> Buscar</button>
        <a href="/productos" class="nav-btn"><i class="bi bi-x"></i> Limpiar</a>
    </form>

    <!-- Table -->
    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Categoría</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(productos)}">
                <td colspan="7">
                    <div class="empty">
                        <i class="bi bi-inbox"></i>
                        No hay productos registrados.
                    </div>
                </td>
            </tr>
            <tr th:each="p : ${productos}">
                <td style="color:var(--muted);font-family:'Space Mono',monospace;font-size:.8rem;" th:text="${p.id}">1</td>
                <td style="font-weight:600;" th:text="${p.nombre}">—</td>
                <td style="color:var(--muted);font-size:.85rem;" th:text="${p.descripcion}">—</td>
                <td><span class="badge-cat" th:text="${p.categoria.nombre}">—</span></td>
                <td><span class="precio">S/ <span th:text="${#numbers.formatDecimal(p.precio,1,2)}">0.00</span></span></td>
                <td>
                    <span th:if="${p.stock > 5}"  class="badge-stock stock-ok"  th:text="${p.stock} + ' und.'">—</span>
                    <span th:if="${p.stock <= 5}" class="badge-stock stock-low" th:text="${p.stock} + ' und.'">—</span>
                </td>
                <td style="display:flex;gap:.5rem;flex-wrap:wrap;">
                    <a th:href="@{/productos/editar/{id}(id=${p.id})}" class="action-btn btn-edit">
                        <i class="bi bi-pencil-fill"></i> Editar
                    </a>
                    <a th:href="@{/productos/eliminar/{id}(id=${p.id})}" class="action-btn btn-del"
                       onclick="return confirm('¿Eliminar este producto?')">
                        <i class="bi bi-trash-fill"></i> Eliminar
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
